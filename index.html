<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programas</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

/* VIDEO DE FONDO */
#fondo-video{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* CAPA OSCURA */
.overlay{
    width:100%;
    min-height:100vh;
    background:rgba(0,0,0,0.6);
    padding:30px;
    text-align:center;
    color:white;
}

/* TITULOS */
h1{
    margin-top:40px;
    font-size:55px;
    text-shadow:0 0 15px cyan;
}

h2{
    margin-top:40px;
    font-size:45px;
}

/* LOGO */
.logo{
    width:300px;
    margin-top:40px;
    border-radius:20px;
    box-shadow:0 0 25px cyan;
}

/* BOTONES */
.botones{
    margin-top:50px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
}

button{
    width:280px;
    padding:20px;
    font-size:30px;
    border:none;
    border-radius:20px;
    background:linear-gradient(90deg,#2563eb,#00c3ff);
    color:white;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(0,255,255,0.5);
}

button:hover{
    transform:scale(1.05);
}

a{
    text-decoration:none;
}

</style>
</head>

<body>

<!-- VIDEO DE FONDO -->
<video autoplay muted loop id="fondo-video">
  <source src="video/myFondo.mp4" type="video/mp4">
</video>

<div class="overlay">

<h1>->Colegio de Educación Técnica N°3117<-</h1>

<h2>¡Programas de Materias!</h2>

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Escudo_de_la_Provincia_de_Salta.svg/512px-Escudo_de_la_Provincia_de_Salta.svg.png">

<div class="botones">

<a href="manana.html">
  <button>Turno Mañana</button>
</a>

<a href="tarde.html">
  <button>Turno Tarde</button>
</a>

</div>

</div>

</body>
</html>
